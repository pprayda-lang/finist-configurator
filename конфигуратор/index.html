<html lang="ru">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f6f5ec;
      color: #2b2a28;
    }

    .configurator {
      max-width: 1100px;
      margin: 40px auto;
      display: flex;
      gap: 20px;
      padding: 20px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
    }

    .sidebar {
      width: 200px;
      background: #2b2a28;
      color: #f6f5ec;
      padding: 20px;
      border-radius: 12px;
      flex-shrink: 0;
    }

    .sidebar h2 {
      font-size: 18px;
      margin-bottom: 15px;
      color: #ed7f1c;
    }

    .sidebar button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px 0;
      background: #3a3937;
      border: none;
      color: #f6f5ec;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.2s, color 0.2s;
    }

    .sidebar button:hover,
    .sidebar button.active {
      background: #ed7f1c;
      color: #2b2a28;
      font-weight: bold;
    }

    .main {
      flex: 1;
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .card {
      background: #f6f5ec;
      border-radius: 12px;
      padding: 20px;
      box-shadow: inset 0 0 6px rgba(0, 0, 0, 0.08);

    }

    .preview {
      display: flex;
      flex-direction: column;
      align-items: stretch;

    }

    .preview img {
      display: block;
      margin: 0 auto 15px auto;
      max-width: 100%;
    }

    .preview h2 {
      margin-top: 0;
      color: #2b2a28;
      border-bottom: 2px solid #ed7f1c;
      padding-bottom: 5px;
    }

    .options {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .options-list {
      flex: 1;
      overflow-y: auto;
      padding-right: 10px;
      max-height: 600px;
      scrollbar-width: thin;
      scrollbar-color: #ed7f1c #f6f5ec;
    }

    .options::-webkit-scrollbar {
      width: 8px;
    }

    .options::-webkit-scrollbar-track {
      background: #f6f5ec;
      border-radius: 8px;
    }

    .options::-webkit-scrollbar-thumb {
      background-color: #ed7f1c;
      border-radius: 8px;
      border: 2px solid #f6f5ec;
    }

    .options::-webkit-scrollbar-thumb:hover {
      background-color: #d66f0c;
    }

    .options h2 {
      margin-top: 0;
      color: #2b2a28;
      border-bottom: 2px solid #ed7f1c;
      padding-bottom: 5px;
    }

    details {
      margin: 12px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    details:hover {
      border-color: #ed7f1c;
    }

    summary {
      cursor: pointer;
      padding: 10px;
      font-weight: bold;
      background: #f0f0f0;
      color: #2b2a28;
    }


    .option {
      display: flex;
      align-items: center;
      padding: 12px;
      border-top: 1px solid #eee;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .option:first-of-type {
      border-top: none;
    }

    .option:hover {
      background: #f9f3e8;
    }

    .option.active {
      background: #e9e6dd;
      border-left: 4px solid #ed7f1c;
    }

    .option input[type="checkbox"] {
      display: none;
    }

    .custom-checkbox {
      width: 18px;
      height: 18px;
      border: 2px solid #2b2a28;
      border-radius: 4px;
      margin-right: 12px;
      position: relative;
      flex-shrink: 0;
    }

    .option input[type="checkbox"]:checked+.custom-checkbox {
      background: #ed7f1c;
      border-color: #ed7f1c;
    }

    .option input[type="checkbox"]:checked+.custom-checkbox::after {
      content: "✓";
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 14px;
      color: #fff;
    }

    .option .info {
      flex: 1;
    }

    .option .info .name {
      font-size: 14px;
      font-weight: 500;
      color: #2b2a28;
    }

    .option .info .price {
      font-size: 14px;
      font-weight: bold;
      color: #ed7f1c;
    }

    .options-footer {
      margin-top: 20px;
      padding-top: 10px;
      border-top: 1px solid #ddd;
    }

    .options-footer .base {
      font-size: 16px;
      color: #2b2a28;
      margin-bottom: 6px;
    }

    .options-footer .addons {
      font-size: 16px;
      color: #2b2a28;
      margin-bottom: 10px;
    }

    .options-footer .divider {
      border-top: 2px dashed #ccc;
      margin: 10px 0;
    }

    .options-footer .total {
      font-size: 20px;
      color: #ed7f1c;
      font-weight: bold;
      margin-top: 10px;
    }

      }

      .sidebar button.active {

        color: #2b2a28;
      }

      .main {

        width: 100%;
        gap: 12px;
      }

      .preview img {

      }

    .slider {

      width: 100%;
      overflow: hidden;
      border-radius: 12px;
      align-self: center;
      margin-top: 20px;
    }

    .slider img {

      display: none;
      transition: opacity 0.4s ease;
      border-radius: 12px;
    }

    .slider img.active {

    }

    .slider button.prev,

      background: rgba(43, 42, 40, 0.6);

      border: none;
      font-size: 24px;
      padding: 8px 14px;

      border-radius: 50%;

    }

    .slider button.prev:hover,

      transition: background 0.3s;
    }

    .slider-dots .dot.active,

      background: #ed7f1c;
    }

    .slider img {
      cursor: grab;
    }

    .slider img:active {
      cursor: grabbing;
    }
  </style>
</head>

        (src, i) => `<img src="${src}" class="slide ${i === 0 ? "active" : ""}" alt="${currentModel.name}">`
      ).join("");

      preview.innerHTML = `
    <h2>${currentModel.name}</h2>
    <div class="slider">
      ${imgs}
      <button class="prev" onclick="changeSlide(-1)">&#10094;</button>
      <button class="next" onclick="changeSlide(1)">&#10095;</button>
    </div>
    <div class="slider-dots">
      ${currentModel.images.map((_, i) => `<span class="dot ${i === 0 ? "active" : ""}" onclick="goToSlide(${i})"></span>`).join("")}
    </div>
    <div class="desc">${currentModel.desc}</div>
  `;
      currentSlide = 0;
    }

    function renderOptions() {
      const optionsDiv = document.getElementById("options");

      let list = optionsDiv.querySelector('.options-list');
      if (!list) {
        list = document.createElement('div');
        list.className = 'options-list';
        optionsDiv.appendChild(list);
      }

      list.innerHTML = '';

      for (let category in currentModel.options) {
        const details = document.createElement('details');
        const summary = document.createElement('summary');
        summary.textContent = category;
        details.appendChild(summary);

        currentModel.options[category].forEach(opt => {
          const label = document.createElement('label');
          label.className = 'option';
          label.innerHTML = `
          <input type="checkbox" value="${opt.price}" onchange="updateTotal()">
          <span class="custom-checkbox"></span>
          <div class="info">
            <div class="name">${opt.name}</div>
            <div class="price">${formatNumber(opt.price)} руб.</div>
          </div>
        `;
          details.appendChild(label);
        });

        list.appendChild(details);
      }

      let footer = optionsDiv.querySelector('.options-footer');
      if (!footer) {
        footer = document.createElement('div');
        footer.className = 'options-footer';
        optionsDiv.appendChild(footer);
      }


      footer.innerHTML = `
  <div class="base">Базовая цена: <span id="basePrice">${formatNumber(currentModel.basePrice)}</span> руб.</div>
  <div class="addons">Дополнения: <span id="addonsPrice">0</span> руб.</div>
  <div class="divider"></div>
  <div class="total">Итого: <span id="totalPrice">${formatNumber(currentModel.basePrice)}</span> руб.</div>
`;

      updateTotal();
    }

    function updateTotal() {
      if (!currentModel) return;

      const checkboxes = document.querySelectorAll('.option input[type="checkbox"]');
      let addons = 0;
      checkboxes.forEach(ch => {
        if (ch.checked) addons += +ch.value;
      });

      const base = currentModel.basePrice;
      const total = base + addons;

      document.getElementById('addonsPrice').textContent = formatNumber(addons);
      document.getElementById('totalPrice').textContent = formatNumber(total);
    }
    let currentSlide = 0;

    function changeSlide(n) {
      showSlide(currentSlide + n);
    }

    function goToSlide(n) {
      showSlide(n);
    }

    function showSlide(n) {
      const slides = document.querySelectorAll(".slide");
      const dots = document.querySelectorAll(".dot");

      if (slides.length === 0) return;

      currentSlide = (n + slides.length) % slides.length; // зацикливание

      slides.forEach((s, i) => s.classList.toggle("active", i === currentSlide));
      dots.forEach((d, i) => d.classList.toggle("active", i === currentSlide));
    }
    selectModel('finist');

    let startX = 0;
    let isDown = false;

    const slider = document.querySelector('.slider');

    slider.addEventListener("mousedown", (e) => {
      isDown = true;
      startX = e.clientX;
      e.preventDefault(); // блокируем выделение
    });

    slider.addEventListener("mousemove", (e) => {
      if (!isDown) return;
      e.preventDefault(); // блокируем выделение при движении мыши
    });

    slider.addEventListener("mouseup", (e) => {
      if (!isDown) return;
      isDown = false;

      const diff = e.clientX - startX;
      if (Math.abs(diff) > 50) {
        changeSlide(diff > 0 ? -1 : 1);
      }
    });

    slider.addEventListener("mouseleave", () => {
      isDown = false; // сброс, если мышь ушла за пределы слайдера
    });

    document.addEventListener("touchstart", (e) => {
      const slider = e.target.closest(".slider");
      if (!slider) return;
      startX = e.touches[0].clientX;
    });

    document.addEventListener("touchend", (e) => {
      if (!startX) return;
      const diff = e.changedTouches[0].clientX - startX;
      if (Math.abs(diff) > 50) {
        changeSlide(diff > 0 ? -1 : 1);
      }
      startX = 0;
    });
  </script>


</body>

</html>
